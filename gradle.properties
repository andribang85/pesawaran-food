# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check the build file for more details.
# For more details on how to configure your build environment visit
# http://www.gradle.org/configure-gradle-for-your-project
# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for headless machines. See also http://www.gradle.org/java-home
# When configured, Gradle will run in incubating parallel mode.
# This option should only be used with decoupled projects. More details at http://www.gradle.org/guide/performance_tuning#configuration_on_demand
# org.gradle.parallel=true
# AndroidX package structure to make it clearer which packages are being used
androidx.useAndroidX=true
# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official
# Enable the new build system
android.useNewApkCreator=true
# Gradle memory
org.gradle.jvmargs=-Xmx4096m
# Enable desugaring for older API levels
android.desugaredLibConfig=true